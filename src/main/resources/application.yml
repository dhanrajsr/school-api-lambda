server:
  port: 8080                    # Ignored in Lambda — kept for local dev

spring:
  datasource:
    # Values injected from Lambda environment variables at runtime
    # Fallback to local PostgreSQL for local dev
    url: ${DB_URL:jdbc:postgresql://localhost:5432/schooldb}
    username: ${DB_USERNAME:school}
    password: ${DB_PASSWORD:school123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2      # Keep low — Lambda has limited concurrent DB connections
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.school: INFO
